services:

  task-service:
    container_name: task-service
    image: task-service:latest
    platform: linux/amd64
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini
    env_file:
      - env/task-service.env
      - env/postgres.env
      - env/rabbitmq.env
      - env/redis.env
      - env/kafka.env
    networks:
      - tasks
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    build:
      context: .
    pull_policy: build

  task-worker:
    container_name: task-worker
    image: task-manager:latest
    platform: linux/amd64
    volumes:
      - ./src:/app/src
    env_file:
      - env/task-service.env
      - env/postgres.env
      - env/rabbitmq.env
      - env/redis.env
    networks:
      - tasks
    build:
      context: .
    pull_policy: build
    command: [ "arq", "arq_worker.WorkerSettings" ]

networks:
  tasks:
    external: true
